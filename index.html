<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor 360° | Bryan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador 360°</h1>
        <p>Ajuste sua foto para o padrão imersivo.</p>

        <div class="controls">
            <label for="image-input" class="btn primary">📁 Selecionar Foto</label>
            <input type="file" id="image-input" accept="image/*" style="display:none;">

            <button onclick="baixar('jpg')" id="btn-jpg" class="btn secondary" style="display:none;">💾 JPG 360</button>
            <button onclick="baixar('png')" id="btn-png" class="btn secondary" style="display:none;">💾 PNG 360</button>
        </div>

        <div id="panorama-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="script.js"></script>
</body>
</html>
