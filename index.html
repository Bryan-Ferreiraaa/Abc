<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor 360° Profissional</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .btn { padding: 15px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin: 10px; display: inline-block; text-decoration: none; }
        .primary { background: #00ff88; color: black; }
        .secondary { background: #333; color: white; }
        #panorama-container { width: 100%; height: 450px; background: #222; border-radius: 15px; margin-top: 20px; border: 2px solid #00ff88; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <h1>Conversor 360° Premium</h1>
    <p>A foto girará automaticamente em qualquer rede social.</p>

    <form action="/convert" method="post" enctype="multipart/form-data" id="upload-form">
        <label for="image-input" class="btn primary">📁 Selecionar Imagem</label>
        <input type="file" name="image" id="image-input" accept="image/*" onchange="previewImage(event)">
        <button type="submit" class="btn secondary">🚀 Converter e Baixar 360°</button>
    </form>

    <div id="panorama-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('panorama-container').innerHTML = '';
                pannellum.viewer('panorama-container', {
                    "type": "equirectangular",
                    "panorama": reader.result,
                    "autoLoad": true
                });
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
