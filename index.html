<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conversor 360 Real</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid #00ff88; padding: 20px; margin: 20px auto; max-width: 500px; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
        #panorama { width: 100%; height: 300px; background: #222; margin-top: 10px; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
</head>
<body>
    <div class="box">
        <h1>Gerador de Foto 360°</h1>
        <input type="file" id="arquivo" accept="image/*"><br><br>
        
        <button onclick="converter('jpg')">BAIXAR JPG 360</button>
        <button onclick="converter('png')">BAIXAR PNG 360</button>
        
        <div id="panorama"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="script.js"></script>
</body>
</html>
