<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor 360° Universal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .btn { padding: 15px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .primary { background: #00ff88; color: #000; font-size: 1.1em; }
        .secondary { background: #333; color: white; display: none; } /* Escondidos até carregar foto */
        #panorama-container { width: 100%; height: 400px; background: #1e1e1e; border-radius: 20px; border: 2px solid #333; margin-top: 20px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Conversor 360°</h1>
        <p>Transforme qualquer foto em um panorama imersivo real.</p>

        <div class="controls">
            <label for="image-input" class="btn primary">📁 Carregar Foto</label>
            <input type="file" id="image-input" accept="image/*" onchange="previewAndEnable(event)">
            
            <button onclick="submitForm('jpg')" id="btn-jpg" class="btn secondary">💾 Baixar JPG (Leve)</button>
            <button onclick="submitForm('png')" id="btn-png" class="btn secondary">💾 Baixar PNG (Full)</button>
        </div>

        <form id="hidden-form" method="post" enctype="multipart/form-data" style="display:none;">
            <input type="file" name="image" id="actual-input">
        </form>

        <div id="panorama-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script>
        function previewAndEnable(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Sincroniza o arquivo com o formulário oculto
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            document.getElementById('actual-input').files = dataTransfer.files;

            // Mostra os botões de download
            document.getElementById('btn-jpg').style.display = 'block';
            document.getElementById('btn-png').style.display = 'block';

            // Preview 360
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('panorama-container').innerHTML = '';
                pannellum.viewer('panorama-container', {
                    "type": "equirectangular",
                    "panorama": reader.result,
                    "autoLoad": true
                });
            };
            reader.readAsDataURL(file);
        }

        function submitForm(type) {
            const form = document.getElementById('hidden-form');
            form.action = '/convert/' + type;
            form.submit();
        }
    </script>
</body>
</html>
