<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor 360° | Bryan</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Conversor 360° Profissional</h1>
        <p>Gere panoramas compatíveis com Facebook e Google Street View.</p>

        <div class="controls">
            <label for="image-input" class="btn primary">📁 Selecionar Foto</label>
            <input type="file" id="image-input" accept="image/*">

            <button onclick="baixar360('jpg')" id="btn-jpg" class="btn download-btn">💾 JPG (Leve)</button>
            <button onclick="baixar360('png')" id="btn-png" class="btn download-btn">💾 PNG (Alta Qualidade)</button>
        </div>

        <div id="panorama-container">
            <div class="placeholder">Aguardando imagem...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="script.js"></script>
</body>
</html>
