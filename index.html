<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Conversor 360</title>

<link rel="stylesheet" href="style.css">

<!-- Biblioteca para EXIF -->
<script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.js"></script>

<!-- Pannellum (visualizador 360) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

</head>
<body>

<h1>Conversor de Imagem para 360°</h1>

<input type="file" id="file-upload" accept="image/*">

<br><br>

<button id="download-360" disabled>
Baixar imagem 360
</button>

<br><br>

<div id="panorama-container"></div>

<canvas id="conversion-canvas"></canvas>

<script src="script.js"></script>

</body>
</html>
